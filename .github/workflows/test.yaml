name: Test Project
on: push
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Get into directory
        run: cd second-action-react
      - name: Install nodejs
        uses: actions/setup-node@v4
        with: { node-version: 18, cache: "npm" }
      - name: output the current directory
        run: pwd
      - name: Change into product directory
        run: cd second-action-react
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
