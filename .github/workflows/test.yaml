name: Test Project
on:
  push:
  workflow_dispatch
jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: second-action-react
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: output the current directory
        run: tree .
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: second-action-react
    steps:
      - name: GET CODE
        uses: actions/checkout@v6
      - name: INSTALL DEPENDENCIES
        run: npm ci
      - name: RUN TEST
        run: npm run test
      - name: BUILD PROJECT
        run: npm run build
      - name: DEPLOY PROJECT
        run: echo "Deploying ....."
