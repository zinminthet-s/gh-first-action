name: Test Project
on: push
jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: second-action-react
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: output the current directory
        run: tree .
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
