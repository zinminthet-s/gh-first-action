name: Test Project
on: push
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: output the current directory
        run: tree .
      - name: Get into directory
        run: cd second-action-react & ls
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
